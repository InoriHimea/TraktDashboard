name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run quality gate
              run: pnpm run ci

    e2e:
        runs-on: ubuntu-latest
        needs: ci

        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Build web app
              run: pnpm --filter @trakt-dashboard/web build

            - name: Run E2E tests
              run: pnpm test:e2e
              env:
                  BASE_URL: http://localhost:5173

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

    smoke-test:
        runs-on: ubuntu-latest
        needs: ci

        steps:
            - uses: actions/checkout@v4

            - name: Build API image
              run: docker build -t trakt-api:smoke -f apps/api/Dockerfile .

            - name: Build Web image
              run: docker build -t trakt-web:smoke -f apps/web/Dockerfile .

            - name: Start services
              run: docker compose up -d
              env:
                  API_IMAGE: trakt-api:smoke
                  WEB_IMAGE: trakt-web:smoke
                  POSTGRES_PASSWORD: smoke_ci_password
                  TRAKT_CLIENT_ID: smoke_fake_id
                  TRAKT_CLIENT_SECRET: smoke_fake_secret
                  TMDB_API_KEY: smoke_fake_tmdb_key
                  API_SECRET: smoke_fake_api_secret_for_ci_use_only

            - name: Wait for all services to be healthy (max 90s)
              run: |
                  timeout 90 bash -c '
                    until [ "$(docker compose ps --format json | jq -r "[.[].Health] | all(. == \"healthy\")")" = "true" ]; do
                      echo "Waiting for services..."
                      docker compose ps --format "table {{.Name}}\t{{.Status}}"
                      sleep 5
                    done
                  '

            - name: Verify nginx serves the SPA
              run: curl -fsSL http://localhost/ | grep -q "Trakt Dashboard"

            - name: Verify API health endpoint
              run: curl -fsS http://localhost:3001/health | jq -e '.ok == true'

            - name: Tear down
              if: always()
              run: docker compose down -v
              env:
                  POSTGRES_PASSWORD: smoke_ci_password

    # N6 batch 2: GitHub is only a mirror (primary remote is self-hosted), so a red
    # Actions run goes unseen unless it is pushed somewhere visible. Requires the
    # GOTIFY_URL / GOTIFY_TOKEN repository secrets; silently no-ops until they exist.
    notify-failure:
        runs-on: ubuntu-latest
        needs: [ci, e2e, smoke-test]
        if: failure()
        steps:
            - name: Push failure notification to Gotify
              continue-on-error: true
              env:
                  GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
                  GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
              run: |
                  if [ -z "$GOTIFY_URL" ] || [ -z "$GOTIFY_TOKEN" ]; then
                    echo "Gotify secrets not configured; skipping notification."
                    exit 0
                  fi
                  curl -sf -X POST "$GOTIFY_URL/message?token=$GOTIFY_TOKEN" \
                    -F "title=CI failed: ${{ github.repository }}@${{ github.ref_name }}" \
                    -F "message=Workflow: ${{ github.workflow }}
                  Commit: ${{ github.sha }}
                  Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                    -F "priority=8"
