server {
    listen 80;
    # The official nginx image's entrypoint normally auto-adds this for images that still
    # ship the packaged default.conf unmodified; since we replace it wholesale, that helper
    # skips us and we never bind IPv6. Environments where `localhost` resolves to ::1 first
    # (observed on GitHub Actions runners) then get "connection refused" against ::1 even
    # though the IPv4 listener is fine — this is exactly why the smoke-test healthcheck
    # (`wget http://localhost/`) failed on every run since it was introduced.
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Baseline security headers (P2-T08). `always` so they apply to error responses too.
    # NOTE: a location with its own add_header does NOT inherit these; the HTML document
    # (SPA fallback, no add_header) does inherit them, which is what matters most.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP enforced (N1-T03). Upgraded from report-only after confirming no violations.
    # Google Fonts: googleapis.com for CSS, gstatic.com for font files.
    # 'unsafe-inline' for script/style retained for the theme-detection inline script
    # and Tailwind utility classes; a nonce-based approach can harden this further.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'sha256-knrujrB5pyiDKG411BP5jNIza3kkrF6RhXgAOaS5nUE='; connect-src 'self'; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'self'; base-uri 'self'" always;

    # API reverse proxy → Bun/Hono
    location /api/ {
        proxy_pass http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Auth routes proxy
    location /auth/ {
        proxy_pass http://api:3001/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Keep generated source maps out of the public static surface.
    location ~* \.map$ {
        return 404;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker must be able to control the entire origin (N4-T01).
    location = /sw.js {
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SW registration script — no aggressive caching so updates propagate
    location = /sw-register.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — all other routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
